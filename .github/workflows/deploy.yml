name: Deploy to Azure

# Builds the app and deploys to Azure App Service on every push to main.
# Requires an AZURE_WEBAPP_PUBLISH_PROFILE secret in the repo settings.
#
# The Express server serves the built React client from client/dist, so the
# whole app deploys as a single App Service.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: phishlens   # change to your App Service name
  NODE_VERSION: 20

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install and test server
        working-directory: server
        run: |
          npm ci
          npm test

      - name: Build client
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
